x-base: &base
  build:
    context: .
    dockerfile: ./Dockerfile.test
  environment: &base-env
    DATABASE_HOST: postgres
    DATABASE_PORT: 5432
    DATABASE_USERNAME: postgres
    DATABASE_PASSWORD: postgres
    RAILS_ENV: test
    RAILS_LOG_TO_STDOUT: true

services:
  app:
    <<: *base
    depends_on:
      postgres:
        condition: service_healthy
      chrome:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./tmp/capybara:/app/tmp/capybara
    environment:
      <<: *base-env
      CI: true
      CHROME_URL: http://chrome:3333
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-}
    healthcheck:
      test: curl --fail http://0.0.0.0:3000/ready || exit 1
      retries: 3
      start_period: 10s
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: podi_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chrome:
    image: browserless/chrome:1.31-chrome-stable
    ports:
      - 3333:3333
    # Mount application source code to support file uploading
    # (otherwise Chrome won't be able to find files).
    # NOTE: Make sure you use absolute paths in `#attach_file`.
    volumes:
      - .:/app:cached # change it for your rails' container directory
    environment:
      # By default, it uses 3000, which is typically used by Rails.
      PORT: 3333
      # Set connection timeout to avoid timeout exception during debugging
      # https://docs.browserless.io/docs/docker.html#connection-timeout
      CONNECTION_TIMEOUT: 600000
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3333/json/version || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
