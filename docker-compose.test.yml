x-base: &base
  build:
    context: .
    dockerfile: ./Dockerfile.test
  environment: &base-env
    DATABASE_HOST: postgres
    DATABASE_PORT: 5432
    DATABASE_USERNAME: postgres
    DATABASE_PASSWORD: postgres
    RAILS_ENV: test
    RAILS_LOG_TO_STDOUT: true

services:
  app:
    <<: *base
    depends_on:
      postgres:
        condition: service_healthy
      chrome:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./tmp/capybara:/app/tmp/capybara
    environment:
      <<: *base-env
      CI: "true"
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-}
      SELENIUM_URL: http://chrome:4444/wd/hub
      # which port Capybara should be starting the test server
      CAPYBARA_SERVER_PORT: "30000"
      # The test server WILL NOT BE AVAILABLE from outside the container if it binds
      # to 127.0.0.1. It must bind to 0.0.0.0 to be exposed to the outside world.
      CAPYBARA_SERVER_HOST: "0.0.0.0"
      CAPYBARA_APP_HOST: "http://podi:30000"
    healthcheck:
      test: curl --fail http://0.0.0.0:3000/ready || exit 1
      retries: 3
      start_period: 10s
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: podi_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chrome:
    image: selenium/standalone-chrome
    ports:
      - 4444:4444
      # for debugging open with vnc://localhost:5900
      # but don't run chrome in headless mode
      - 5900:5900
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4444/wd/hub/status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
