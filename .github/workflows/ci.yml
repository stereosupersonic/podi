name: CI

on:
  pull_request:
  push:
    branches: [ master ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_gems:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for known security vulnerabilities in gems
        run: bin/bundler-audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ hashFiles('.ruby-version', 'Gemfile.lock') }}

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  docker:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: .ruby-version
        bundler-cache: true

    - name: Start chrome container
      run: |
        docker compose -f docker-compose.test.yml up -d chrome
        echo "--- Waiting 10s for chrome to start ---"
        sleep 10
        echo "--- Chrome container status ---"
        docker compose -f docker-compose.test.yml ps chrome
        echo "--- Chrome container logs ---"
        docker compose -f docker-compose.test.yml logs chrome
        echo "--- Healthcheck test manually ---"
        docker compose -f docker-compose.test.yml exec -T chrome wget --spider -q http://localhost:9222/json/version || echo "Healthcheck failed"
        docker compose -f docker-compose.test.yml exec -T chrome wget -O- http://localhost:9222/json/version 2>&1 || echo "Could not reach CDP endpoint"

    - name: Start remaining containers
      run: |
        docker compose -f docker-compose.test.yml up -d --build
        docker compose -f docker-compose.test.yml ps
        docker compose -f docker-compose.test.yml logs

    - name: prepare
      run: |
        docker compose -f docker-compose.test.yml ps
        docker compose -f docker-compose.test.yml logs
        docker stats --no-stream
        docker compose -f docker-compose.test.yml exec -T app bin/rails db:create db:schema:load --trace

    - name: Run tests
      run: |
        docker compose -f docker-compose.test.yml exec -e CI=true -e COVERAGE=true -T app bundle exec rspec .

    - name: Check coverage on changed lines
      if: github.event_name == 'pull_request'
      run: bundle exec undercover --compare ${{ github.event.pull_request.base.sha }}

    - name: Stop containers
      if: always()
      run: docker compose -f docker-compose.test.yml down
