name: Security Updates

on:
  schedule:
    - cron: "0 6 * * *" # Every day at 6:00 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  security_updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: yarn

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Unfreeze bundle for updates
        run: bundle config set frozen false

      - name: Run bundler-audit and collect vulnerable gems
        id: audit
        run: |
          set +e
          audit_output=$(bundle exec bundler-audit check --update 2>&1)
          audit_exit=$?
          set -e

          echo "$audit_output"

          if [ $audit_exit -eq 0 ]; then
            echo "vulnerable_gems=" >> "$GITHUB_OUTPUT"
            echo "has_vulnerabilities=false" >> "$GITHUB_OUTPUT"
          else
            # Extract gem names from bundler-audit output (lines like "Name: gem_name")
            gems=$(echo "$audit_output" | grep "^Name:" | awk '{print $2}' | sort -u | tr '\n' ' ')
            echo "vulnerable_gems=$gems" >> "$GITHUB_OUTPUT"
            echo "has_vulnerabilities=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update vulnerable gems
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        run: |
          gems="${{ steps.audit.outputs.vulnerable_gems }}"
          if [ -n "$gems" ]; then
            echo "Updating vulnerable gems: $gems"
            bundle update $gems
          fi

      - name: Update all gems to latest patch versions
        run: bundle update --patch

      - name: Check for JS vulnerabilities
        id: js_audit
        run: |
          set +e
          yarn audit --level moderate 2>&1
          js_exit=$?
          set -e

          if [ $js_exit -ne 0 ]; then
            echo "has_js_vulnerabilities=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_js_vulnerabilities=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update JS dependencies if vulnerable
        if: steps.js_audit.outputs.has_js_vulnerabilities == 'true'
        run: yarn upgrade

      - name: Run RuboCop auto-fix
        run: bundle exec rubocop -a --fail-level fatal || true

      - name: Clean up vendor directory
        run: git checkout -- vendor/ 2>/dev/null || true && rm -rf vendor/bundle

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: security/batch-dependency-updates
          commit-message: "fix: batch security dependency updates"
          title: "fix: batch security dependency updates"
          body: |
            ## Automated Security Updates

            This PR was automatically generated by the scheduled security updates workflow.

            ### Changes
            - Updated gems flagged by `bundler-audit`
            - Updated JS dependencies if vulnerabilities were found
            - Applied RuboCop auto-fixes

            ### Vulnerable gems updated
            `${{ steps.audit.outputs.vulnerable_gems || 'none' }}`

            Please review the changes and ensure CI passes before merging.
          labels: security,dependencies
          assignees: stereosupersonic
          reviewers: stereosupersonic
          delete-branch: true
